services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: eticsearch_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - eticsearch
      - ddev

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: eticsearch_kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - eticsearch

volumes:
  esdata:
    driver: local

networks:
  eticsearch:
    driver: bridge
  ddev: # this network allows the ddev container and the elasticsearch to communicate
    name: ddev-eticsearch-demo_default
    external: true
