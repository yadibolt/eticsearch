eticsearch.settings:
  type: config_object
  label: 'Eticsearch settings'
  mapping:
    host:
      type: string
      label: 'Host'
    port:
      type: integer
      label: 'Port'
    auth_method:
      type: string
      label: 'Authentication method'
    username:
      type: string
      label: 'Username'
    password:
      type: string
      label: 'Password'
    api_key_id:
      type: string
      label: 'API Key ID'
    api_key:
      type: string
      label: 'API Key'
    verify_ssl:
      type: boolean
      label: 'Verify SSL certificate'
    ca_cert:
      type: string
      label: 'CA certificate path'
    index_name:
      type: string
      label: 'Index name'

node.type.*.third_party.eticsearch:
  type: mapping
  label: 'Eticsearch node type settings'
  mapping:
    index:
      type: boolean
      label: 'Enable indexing by Eticsearch'
