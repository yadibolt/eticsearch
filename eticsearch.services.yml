services:
  eticsearch.factory.config:
    class: Drupal\eticsearch\Factory\ConfigFactory
    arguments:
      - '@config.factory'

  eticsearch.provider.elasticsearch:
    class: Drupal\eticsearch\Provider\ESProvider

  eticsearch.factory.index: #remove
    class: Drupal\eticsearch\Factory\IndexFactory
    arguments:
      - '@eticsearch.provider.elasticsearch'

  eticsearch.factory.field:
    class: Drupal\eticsearch\Factory\FieldFactory

  eticsearch.factory.mapping:
    class: Drupal\eticsearch\Factory\MappingFactory

  eticsearch.factory.analyzer:
    class: Drupal\eticsearch\Analyzer

  eticsearch.factory.char_filter:
    class: Drupal\eticsearch\CharFilter

  eticsearch.factory.filter:
    class: Drupal\eticsearch\Filter

  eticsearch.factory.normalizer:
    class: Drupal\eticsearch\Normalizer

  eticsearch.factory.similarity:
    class: Drupal\eticsearch\Similarity

  eticsearch.factory.tokenizer:
    class: Drupal\eticsearch\Tokenizer
