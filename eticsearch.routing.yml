# ── Index ─────────────────────────────────────────────────────────────────────

eticsearch.index.list:
  path: '/admin/config/search/eticsearch/index'
  defaults:
    _controller: '\Drupal\eticsearch\Controller\IndexListController::list'
    _title: 'Indices'
  requirements:
    _permission: 'administer site configuration'

eticsearch.index.add:
  path: '/admin/config/search/eticsearch/index/add'
  defaults:
    _form: '\Drupal\eticsearch\Form\Analysis\NameForm'
    _title: 'Add Index'
    component: 'index'
  requirements:
    _permission: 'administer site configuration'

eticsearch.index.edit:
  path: '/admin/config/search/eticsearch/index/{name}/edit'
  defaults:
    _form: '\Drupal\eticsearch\Form\Index\IndexForm'
    _title: 'Configure Index'
  requirements:
    _permission: 'administer site configuration'

eticsearch.index.delete:
  path: '/admin/config/search/eticsearch/index/{name}/delete'
  defaults:
    _form: '\Drupal\eticsearch\Form\Index\IndexDeleteForm'
    _title: 'Delete Index'
  requirements:
    _permission: 'administer site configuration'

# ── Search ────────────────────────────────────────────────────────────────────

eticsearch.search.list:
  path: '/admin/config/search/eticsearch/search'
  defaults:
    _controller: '\Drupal\eticsearch\Controller\SearchListController::list'
    _title: 'Searches'
  requirements:
    _permission: 'administer site configuration'

eticsearch.search.add:
  path: '/admin/config/search/eticsearch/search/add'
  defaults:
    _form: '\Drupal\eticsearch\Form\Search\SearchNameForm'
    _title: 'Add Search'
  requirements:
    _permission: 'administer site configuration'

eticsearch.search.edit:
  path: '/admin/config/search/eticsearch/search/{index_name}/{search_name}/edit'
  defaults:
    _form: '\Drupal\eticsearch\Form\Search\SearchForm'
    _title: 'Configure Search'
  requirements:
    _permission: 'administer site configuration'

eticsearch.search.delete:
  path: '/admin/config/search/eticsearch/search/{index_name}/{search_name}/delete'
  defaults:
    _form: '\Drupal\eticsearch\Form\Search\SearchDeleteForm'
    _title: 'Delete Search'
  requirements:
    _permission: 'administer site configuration'

